<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conexão Campo-Cidade: Calculadora de Sementes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Festejando a Conexão Campo-Cidade</h1>
        <p>Descubra o potencial do campo na sua horta!</p>
    </header>

    <main>
        <section class="calculadora-container">
            <h2>Calculadora de Sementes</h2>
            <p>Insira a área que você tem disponível para plantio (em metros quadrados):</p>
            
            <label for="area">Área (m²):</label>
            <input type="number" id="area" placeholder="Ex: 10">
            
            <button onclick="calcularSementes()">Calcular Total</button>
            
            <div id="resultado"></div>
        </section>
    </main>

    <footer>
        <p>Projeto Autoral - Agrinho 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
