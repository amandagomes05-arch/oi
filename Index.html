<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conexão Campo-Cidade: Calculadora de Sementes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Festejando a Conexão Campo-Cidade</h1>
        <p>Entendendo como o campo alimenta a cidade</p>
    </header>

    <main>
        <section class="calculadora-container">
            <h2>Calculadora de Sementes</h2>
            <p>Descubra a quantidade de sementes necessária para o tamanho da sua horta rural ou urbana.</p>
            
            <div class="input-group">
                <label for="area">Área do plantio (em metros quadrados):</label>
                <input type="number" id="area" min="1" placeholder="Ex: 15" required>
            </div>
            
            <button onclick="calcularSementes()">Calcular Total</button>
            
            <div id="resultado" aria-live="polite"></div>
        </section>
    </main>

    <footer>
        <p>© 2026 - Projeto Autoral para o Concurso Agrinho</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
